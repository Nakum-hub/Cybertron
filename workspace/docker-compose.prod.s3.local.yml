services:
  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set_MINIO_ROOT_PASSWORD}
    expose:
      - "9000"
      - "9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    restart: "no"
    entrypoint:
      - /bin/sh
      - -ec
      - |
        mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"
        mc mb --ignore-existing "local/$$REPORT_STORAGE_S3_BUCKET"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set_MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set_MINIO_ROOT_PASSWORD}
      REPORT_STORAGE_S3_BUCKET: ${REPORT_STORAGE_S3_BUCKET:?set_REPORT_STORAGE_S3_BUCKET}

  backend:
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      REPORT_STORAGE_DRIVER: s3
      REPORT_STORAGE_S3_BUCKET: ${REPORT_STORAGE_S3_BUCKET:?set_REPORT_STORAGE_S3_BUCKET}
      REPORT_STORAGE_S3_REGION: ${REPORT_STORAGE_S3_REGION:-us-east-1}
      REPORT_STORAGE_S3_ENDPOINT: ${REPORT_STORAGE_S3_ENDPOINT:-http://minio:9000}
      REPORT_STORAGE_S3_ACCESS_KEY_ID: ${REPORT_STORAGE_S3_ACCESS_KEY_ID:?set_REPORT_STORAGE_S3_ACCESS_KEY_ID}
      REPORT_STORAGE_S3_SECRET_ACCESS_KEY: ${REPORT_STORAGE_S3_SECRET_ACCESS_KEY:?set_REPORT_STORAGE_S3_SECRET_ACCESS_KEY}
      REPORT_STORAGE_S3_FORCE_PATH_STYLE: ${REPORT_STORAGE_S3_FORCE_PATH_STYLE:-true}

volumes:
  minio_data:
