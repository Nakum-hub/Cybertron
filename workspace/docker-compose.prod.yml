services:
  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?set_REDIS_PASSWORD}
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 8
      start_period: 8s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  postgres:
    image: postgres:16.8-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cybertron}
      POSTGRES_USER: ${POSTGRES_USER:-cybertron}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set_POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cybertron} -d ${POSTGRES_DB:-cybertron}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  backend:
    build:
      context: .
      dockerfile: app/backend/Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    expose:
      - '8001'
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 8001
      APP_VERSION: ${APP_VERSION:-1.0.0}
      REGION: ${REGION:-global}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-https://cybertron.example.com}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://cybertron.example.com}
      LOCAL_PRODUCTION_VALIDATION: ${LOCAL_PRODUCTION_VALIDATION:-false}

      AUTH_MODE: ${AUTH_MODE:-jwt_hs256}
      JWT_SECRET: ${JWT_SECRET:?set_JWT_SECRET}
      REDIS_URL: ${REDIS_URL:?set_REDIS_URL}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set_REDIS_PASSWORD}
      REDIS_CONNECT_TIMEOUT_MS: ${REDIS_CONNECT_TIMEOUT_MS:-2000}
      REDIS_CONNECT_MAX_RETRIES: ${REDIS_CONNECT_MAX_RETRIES:-4}
      JWT_ISSUER: ${JWT_ISSUER:-}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-}
      JWT_CLOCK_SKEW_SECONDS: ${JWT_CLOCK_SKEW_SECONDS:-30}

      ENFORCE_ORIGIN_VALIDATION: 'true'
      TRUST_PROXY: 'true'
      AUTH_TOKEN_TTL_MS: ${AUTH_TOKEN_TTL_MS:-1800000}
      REFRESH_TOKEN_TTL_MS: ${REFRESH_TOKEN_TTL_MS:-2592000000}
      PASSWORD_RESET_TOKEN_TTL_MS: ${PASSWORD_RESET_TOKEN_TTL_MS:-1800000}
      PASSWORD_HASH_ROUNDS: ${PASSWORD_HASH_ROUNDS:-12}
      AUTH_MAX_FAILED_ATTEMPTS: ${AUTH_MAX_FAILED_ATTEMPTS:-5}
      AUTH_LOCKOUT_MS: ${AUTH_LOCKOUT_MS:-900000}
      AUTH_MAX_SESSIONS: ${AUTH_MAX_SESSIONS:-100000}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
      AUTH_COOKIE_SAMESITE: ${AUTH_COOKIE_SAMESITE:-lax}
      AUTH_COOKIE_DOMAIN: ${AUTH_COOKIE_DOMAIN:-}
      AUTH_COOKIE_PATH: ${AUTH_COOKIE_PATH:-/}
      AUTH_ACCESS_COOKIE_NAME: ${AUTH_ACCESS_COOKIE_NAME:-ct_access}
      AUTH_REFRESH_COOKIE_NAME: ${AUTH_REFRESH_COOKIE_NAME:-ct_refresh}
      AUTH_CSRF_COOKIE_NAME: ${AUTH_CSRF_COOKIE_NAME:-ct_csrf}
      CSRF_ENABLED: ${CSRF_ENABLED:-true}
      REQUIRE_DATABASE_FOR_CI: ${REQUIRE_DATABASE_FOR_CI:-true}
      STRICT_DEPENDENCIES: ${STRICT_DEPENDENCIES:-true}
      ALLOW_PUBLIC_REGISTRATION: ${ALLOW_PUBLIC_REGISTRATION:-false}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-20}
      AUTH_IDENTITY_RATE_LIMIT_MAX_REQUESTS: ${AUTH_IDENTITY_RATE_LIMIT_MAX_REQUESTS:-8}
      REPORT_RATE_LIMIT_WINDOW_MS: ${REPORT_RATE_LIMIT_WINDOW_MS:-60000}
      REPORT_RATE_LIMIT_MAX_REQUESTS: ${REPORT_RATE_LIMIT_MAX_REQUESTS:-60}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-1200}
      MAX_CONCURRENT_REQUESTS: ${MAX_CONCURRENT_REQUESTS:-5000}
      ALLOW_INSECURE_DEMO_AUTH: 'false'
      REQUIRE_AUTH_FOR_THREAT_ENDPOINTS: 'true'
      REQUIRE_AUTH_FOR_PLATFORM_ENDPOINTS: 'true'

      METRICS_REQUIRE_AUTH: 'true'
      METRICS_AUTH_TOKEN: ${METRICS_AUTH_TOKEN:?set_METRICS_AUTH_TOKEN}
      REQUEST_TIMEOUT_MS: ${REQUEST_TIMEOUT_MS:-15000}
      HEADERS_TIMEOUT_MS: ${HEADERS_TIMEOUT_MS:-16000}
      KEEP_ALIVE_TIMEOUT_MS: ${KEEP_ALIVE_TIMEOUT_MS:-5000}

      PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-/api}
      PUBLIC_AUTH_LOGIN_PATH: ${PUBLIC_AUTH_LOGIN_PATH:-/v1/auth/login}
      PUBLIC_AUTH_TOKEN_PATH: ${PUBLIC_AUTH_TOKEN_PATH:-/v1/auth/token}
      PUBLIC_AUTH_ME_PATH: ${PUBLIC_AUTH_ME_PATH:-/v1/auth/me}
      PUBLIC_AUTH_LOGOUT_PATH: ${PUBLIC_AUTH_LOGOUT_PATH:-/v1/auth/logout}
      PUBLIC_THREAT_SUMMARY_PATH: ${PUBLIC_THREAT_SUMMARY_PATH:-/v1/threats/summary}
      PUBLIC_THREAT_INCIDENTS_PATH: ${PUBLIC_THREAT_INCIDENTS_PATH:-/v1/threats/incidents}
      PUBLIC_SYSTEM_HEALTH_PATH: ${PUBLIC_SYSTEM_HEALTH_PATH:-/v1/system/health}
      PUBLIC_PLATFORM_APPS_PATH: ${PUBLIC_PLATFORM_APPS_PATH:-/v1/platform/apps}
      PUBLIC_REPORTS_PATH: ${PUBLIC_REPORTS_PATH:-/v1/reports}
      PUBLIC_REPORT_UPLOAD_PATH: ${PUBLIC_REPORT_UPLOAD_PATH:-/v1/reports/upload}
      PUBLIC_REPORT_DOWNLOAD_PATH_TEMPLATE: ${PUBLIC_REPORT_DOWNLOAD_PATH_TEMPLATE:-/v1/reports/{reportId}/download}
      PUBLIC_ANALYTICS_ENABLED: ${PUBLIC_ANALYTICS_ENABLED:-true}
      PUBLIC_ENTERPRISE_MODE: ${PUBLIC_ENTERPRISE_MODE:-true}

      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-cybertron}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cybertron}}
      DB_SSL_MODE: ${DB_SSL_MODE:-verify-full}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-30000}
      DB_CONNECT_TIMEOUT_MS: ${DB_CONNECT_TIMEOUT_MS:-5000}
      DB_STATEMENT_TIMEOUT_MS: ${DB_STATEMENT_TIMEOUT_MS:-10000}
      DB_AUTO_MIGRATE: ${DB_AUTO_MIGRATE:-true}

      REPORT_STORAGE_DRIVER: ${REPORT_STORAGE_DRIVER:-local}
      REPORT_STORAGE_LOCAL_PATH: ${REPORT_STORAGE_LOCAL_PATH:-/srv/cybertron/uploads/reports}
      REPORT_UPLOAD_MAX_BYTES: ${REPORT_UPLOAD_MAX_BYTES:-15728640}
      REPORT_UPLOAD_ALLOWED_MIME_TYPES: ${REPORT_UPLOAD_ALLOWED_MIME_TYPES:-application/pdf,text/csv,application/json}
      REPORT_RETENTION_DAYS: ${REPORT_RETENTION_DAYS:-365}
      REPORT_RETENTION_CLEANUP_INTERVAL_MS: ${REPORT_RETENTION_CLEANUP_INTERVAL_MS:-21600000}
      REPORT_RETENTION_BATCH_SIZE: ${REPORT_RETENTION_BATCH_SIZE:-200}
      REPORT_STORAGE_S3_BUCKET: ${REPORT_STORAGE_S3_BUCKET:-}
      REPORT_STORAGE_S3_REGION: ${REPORT_STORAGE_S3_REGION:-us-east-1}
      REPORT_STORAGE_S3_ENDPOINT: ${REPORT_STORAGE_S3_ENDPOINT:-}
      REPORT_STORAGE_S3_ACCESS_KEY_ID: ${REPORT_STORAGE_S3_ACCESS_KEY_ID:-}
      REPORT_STORAGE_S3_SECRET_ACCESS_KEY: ${REPORT_STORAGE_S3_SECRET_ACCESS_KEY:-}
      REPORT_STORAGE_S3_FORCE_PATH_STYLE: ${REPORT_STORAGE_S3_FORCE_PATH_STYLE:-true}

      LLM_PROVIDER: ${LLM_PROVIDER:-none}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1}
      LLM_REQUEST_TIMEOUT_MS: ${LLM_REQUEST_TIMEOUT_MS:-120000}
      LLM_RATE_LIMIT_WINDOW_MS: ${LLM_RATE_LIMIT_WINDOW_MS:-3600000}
      LLM_RATE_LIMIT_MAX_CALLS: ${LLM_RATE_LIMIT_MAX_CALLS:-100}

      NVD_FEED_URL: ${NVD_FEED_URL:-https://services.nvd.nist.gov/rest/json/cves/2.0}
      NVD_API_KEY: ${NVD_API_KEY:-}
      NVD_REQUEST_TIMEOUT_MS: ${NVD_REQUEST_TIMEOUT_MS:-20000}
      NVD_RESULTS_PER_PAGE: ${NVD_RESULTS_PER_PAGE:-200}
      NVD_SYNC_MAX_ENTRIES: ${NVD_SYNC_MAX_ENTRIES:-400}
      NVD_SYNC_BACKOFF_BASE_MS: ${NVD_SYNC_BACKOFF_BASE_MS:-30000}
      NVD_SYNC_BACKOFF_MAX_MS: ${NVD_SYNC_BACKOFF_MAX_MS:-900000}
      URLHAUS_ENABLED: ${URLHAUS_ENABLED:-false}
      URLHAUS_REQUEST_TIMEOUT_MS: ${URLHAUS_REQUEST_TIMEOUT_MS:-15000}

      WAZUH_API_URL: ${WAZUH_API_URL:-}
      WAZUH_API_TOKEN: ${WAZUH_API_TOKEN:-}
      MISP_API_URL: ${MISP_API_URL:-}
      MISP_API_KEY: ${MISP_API_KEY:-}
      OPENCTI_API_URL: ${OPENCTI_API_URL:-}
      OPENCTI_API_TOKEN: ${OPENCTI_API_TOKEN:-}
      THEHIVE_API_URL: ${THEHIVE_API_URL:-}
      THEHIVE_API_TOKEN: ${THEHIVE_API_TOKEN:-}
      CONNECTOR_TIMEOUT_MS: ${CONNECTOR_TIMEOUT_MS:-6000}

      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid email profile}
      OIDC_AUDIENCE: ${OIDC_AUDIENCE:-}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      MICROSOFT_CLIENT_ID: ${MICROSOFT_CLIENT_ID:-}
      MICROSOFT_CLIENT_SECRET: ${MICROSOFT_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      OAUTH_CALLBACK_BASE_URL: ${OAUTH_CALLBACK_BASE_URL:-}
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    volumes:
      - backend_uploads:/srv/cybertron/uploads
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:8001/v1/system/readiness']
      interval: 15s
      timeout: 5s
      retries: 4
      start_period: 12s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=128m
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2.0"

  frontend:
    build:
      context: .
      dockerfile: app/frontend/Dockerfile
      target: default
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - '${FRONTEND_PORT:-80}:8080'
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /var/cache/nginx:noexec,nosuid,size=64m
      - /var/run:noexec,nosuid,size=16m
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

volumes:
  postgres_data:
  redis_data:
  backend_uploads:

networks:
  default:
    name: cybertron-prod
